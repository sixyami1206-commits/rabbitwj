<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>INDO ShoppingPro</title>
    <style>
        body { font-family: sans-serif; background: #f8f9fa; margin: 0; padding: 20px; color: #333; }
        header, footer { background: #0056b3; color: white; padding: 15px; text-align: center; border-radius: 8px; }
        .container { display: grid; grid-template-columns: 2fr 1fr; gap: 20px; margin-top: 20px; }
        @media (max-width: 768px) { .container { grid-template-columns: 1fr; } }
        .categories { margin-bottom: 15px; }
        .category-btn { padding: 6px 12px; margin-right: 5px; border: 1px solid #ccc; background: white; cursor: pointer; border-radius: 4px; }
        .category-btn.active { background: #0056b3; color: white; }
        .product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 15px; }
        .product-card { background: white; border: 1px solid #ddd; border-radius: 8px; padding: 15px; display: flex; flex-direction: column; justify-content: space-between; }
        .badge { background: #ff3b30; color: white; font-size: 11px; padding: 2px 6px; border-radius: 4px; width: fit-content; }
        .original-price { text-decoration: line-through; color: #888; font-size: 13px; margin-right: 5px; }
        .discount-price { color: #ff3b30; font-weight: bold; font-size: 18px; }
        .sidebar { background: white; padding: 20px; border: 1px solid #ddd; border-radius: 8px; height: fit-content; }
        .cart-item { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #eee; font-size: 14px; }
        .cart-item-remove { color: #ff3b30; cursor: pointer; border: none; background: none; }
        .price-summary { margin: 15px 0; border-top: 1px solid #ddd; padding-top: 10px; }
        .price-row { display: flex; justify-content: space-between; margin-bottom: 5px; }
        .total-row { font-size: 18px; font-weight: bold; color: #ff3b30; }
        .order-form { display: flex; flex-direction: column; gap: 10px; margin-top: 15px; }
        .order-form input, .order-form textarea { padding: 8px; border: 1px solid #ccc; border-radius: 4px; }
        button.action-btn { background: #0056b3; color: white; border: none; padding: 8px; border-radius: 4px; cursor: pointer; font-weight: bold; }
        button.submit-btn { background: #28a745; width: 100%; padding: 12px; }
        table { width: 100%; font-size: 14px; margin-top: 10px; }
        table td { padding: 5px 0; border-bottom: 1px solid #eee; }
    </style>
</head>
<body>

    <header>
        <h1>INDO ShoppingPro</h1>
        <p>🎉 創立記念セール！対象商品40%OFF！海外発送も対応！</p>
    </header>

    <div class="container">
        <main>
            <div class="categories">
                <button class="category-btn active" onclick="filterCategory('all')">すべて</button>
                <button class="category-btn" onclick="filterCategory('gadget')">ガジェット</button>
                <button class="category-btn" onclick="filterCategory('life')">生活雑貨</button>
            </div>
            <div class="product-grid" id="product-list"></div>
        </main>

        <aside class="sidebar">
            <h3>🛒 カート</h3>
            <div id="cart-items"><p style="color: #888; text-align: center;">カートは空です</p></div>

            <div class="price-summary">
                <div class="price-row"><span>小計:</span><span><span id="subtotal">0</span>円</span></div>
                <div class="price-row"><span>送料一律:</span><span><span id="shipping">0</span>円</span></div>
                <div class="price-row total-row"><span>合計:</span><span><span id="total-price">0</span>円</span></div>
            </div>

            <h3>📋 お届け先入力</h3>
            <form class="order-form" id="order-form" onsubmit="submitOrder(event)">
                <input type="text" id="username" required placeholder="お名前">
                <input type="text" id="zipcode" required placeholder="郵便番号">
                <textarea id="address" rows="2" required placeholder="ご住所"></textarea>
                <div style="font-size: 12px; color: #ff3b30;">※お支払いは「代引きのみ」対応しています。</div>
                <button type="submit" class="action-btn submit-btn">注文を確定する (代引き)</button>
            </form>
        </aside>
    </div>

    <footer style="margin-top: 30px; text-align: left;">
        <h3>🏢 会社概要</h3>
        <table>
            <tr><td>創立者</td><td>栗田拓実</td></tr>
            <tr><td>創立日</td><td>2026/7/15</td></tr>
            <tr><td>メッセージ</td><td>皆様に40%OFFの商品を体験してほしいです！海外のかたも、ぜひ！</td></tr>
            <tr><td>送料</td><td>一律 300円</td></tr>
            <tr><td>発送所</td><td>China</td></tr>
            <tr><td>返金方法</td><td>PayPay、PayPal (電子クレジット)</td></tr>
        </table>
    </footer>

    <script>
        const products = [
            { id: 1, name: "ワイヤレスイヤホン", originalPrice: 2900, price: Math.floor(2900 * 0.6), category: "gadget", badge: "40% OFF" },
            { id: 2, name: "ポータブルファン", originalPrice: 1900, price: Math.floor(1900 * 0.6), category: "life", badge: "40% OFF" },
            { id: 3, name: "モバイルバッテリー", originalPrice: 3500, price: 2000, category: "gadget", badge: "目玉特価" },
            { id: 4, name: "スマートマグカップ", originalPrice: 4000, price: Math.floor(4000 * 0.6), category: "life", badge: "40% OFF" }
        ];

        let cart = [];
        const shippingFee = 300;

        function renderProducts(filter = 'all') {
            const grid = document.getElementById('product-list');
            grid.innerHTML = '';
            const filtered = filter === 'all' ? products : products.filter(p => p.category === filter);
            filtered.forEach(p => {
                grid.innerHTML += `
                    <div class="product-card">
                        <div>
                            <span class="badge">${p.badge}</span>
                            <h4 style="margin: 8px 0;">${p.name}</h4>
                        </div>
                        <div>
                            <div style="margin-bottom:10px;">
                                <span class="original-price">${p.originalPrice}円</span>
                                <span class="discount-price">${p.price}円</span>
                            </div>
                            <button class="action-btn" style="width:100%;" onclick="addToCart(${p.id})">カートに追加</button>
                        </div>
                    </div>
                `;
            });
        }

        function filterCategory(category) {
            document.querySelectorAll('.category-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            renderProducts(category);
        }

        function addToCart(productId) {
            const product = products.find(p => p.id === productId);
            const item = cart.find(i => i.id === productId);
            if (item) { item.quantity++; } else { cart.push({ ...product, quantity: 1 }); }
            updateCart();
        }

        function removeFromCart(productId) {
            cart = cart.filter(i => i.id !== productId);
            updateCart();
        }

        function updateCart() {
            const list = document.getElementById('cart-items');
            if (cart.length === 0) {
                list.innerHTML = '<p style="color: #888; text-align: center;">カートは空です</p>';
                document.getElementById('subtotal').textContent = 0;
                document.getElementById('shipping').textContent = 0;
                document.getElementById('total-price').textContent = 0;
                return;
            }
            list.innerHTML = '';
            let subtotal = 0;
            cart.forEach(item => {
                subtotal += item.price * item.quantity;
                list.innerHTML += `
                    <div class="cart-item">
                        <span>${item.name} (${item.quantity})</span>
                        <span>${(item.price * item.quantity)}円 <button class="cart-item-remove" onclick="removeFromCart(${item.id})">✖</button></span>
                    </div>
                `;
            });
            document.getElementById('subtotal').textContent = subtotal;
            document.getElementById('shipping').textContent = shippingFee;
            document.getElementById('total-price').textContent = subtotal + shippingFee;
        }

        // 🌟 サーバー送信。ここだけ自分のサーバーに書き換え可能 🌟
        function submitOrder(event) {
            event.preventDefault();
            if (cart.length === 0) return alert('カートが空です！');

            const orderData = {
                name: document.getElementById('username').value,
                zip: document.getElementById('zipcode').value,
                address: document.getElementById('address').value,
                pay: "代金引換",
                items: cart,
                total: parseInt(document.getElementById('total-price').textContent)
            };

            // ⚠️ サーバーの送信先URLをここに入れる ⚠️
            const url = "https://your-server-endpoint.com/api/order";

            fetch(url, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(orderData)
            })
            .then(res => {
                alert('注文を送信しました！');
                cart = [];
                updateCart();
                document.getElementById('order-form').reset();
            })
            .catch(err => {
                // テスト用にエラー時もコンソールに出して動くようにしています
                console.log("送信データ:", orderData);
                alert('送信処理を実行しました！（URLを設定すると実際にサーバーへ送られます）');
            });
        }

        renderProducts();
    </script>
</body>
</html>
